<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#FFFDF5">
    <title>Saigon Class 🇻🇳</title>
    <script>
        (() => {
            try {
                const savedTheme = localStorage.getItem('saigon_theme') || 'system';
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const resolvedTheme = savedTheme === 'system' ? (prefersDark ? 'night' : 'light') : savedTheme;
                document.documentElement.dataset.themeMode = savedTheme;
                document.documentElement.dataset.theme = resolvedTheme;
            } catch (error) {
                document.documentElement.dataset.themeMode = 'system';
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
    <style>
        /* [1] 디자인 시스템 */
        :root {
            --primary: #DA251D;
            --accent: #FFCD00;
            --dark: #2c3e50;
            --bg: #FFFDF5;
            --sky: #ffffff;
            --leaf: #27ae60;
            --gray: #95a5a6;
            --panel: #ffffff;
            --surface: #f8f9fa;
            --border: #eee;
            --primary-soft: #fff5f5;
            --success-soft: #f0fff4;
            --tip-bg: #fdf6f6;
            --tip-text: #555;
            --drop-bg: #eee;
            --drop-border: #ccc;
            --tutor-bg: #fff9c4;
            --tutor-border: #fbc02d;
            --muted-text: #777;
            --subtle-text: #888;
            --shadow-soft: 0 5px 15px rgba(0,0,0,0.05);
            color-scheme: light;
        }
        html[data-theme="sunset"] {
            --primary: #c94f3d;
            --accent: #ffd166;
            --dark: #553c2a;
            --bg: #fff4e6;
            --sky: #fffaf3;
            --leaf: #8d6e63;
            --gray: #a1887f;
            --panel: #fffaf3;
            --surface: #fff1df;
            --border: #eed9c4;
            --primary-soft: #fff0eb;
            --success-soft: #edf8f1;
            --tip-bg: #fff0e2;
            --tip-text: #7b5b46;
            --drop-bg: #f7e3d1;
            --drop-border: #d4b89b;
            --tutor-bg: #ffe9bf;
            --tutor-border: #e8b04f;
            --muted-text: #7b5b46;
            --subtle-text: #8c7764;
            --shadow-soft: 0 8px 20px rgba(144, 91, 55, 0.12);
            color-scheme: light;
        }
        html[data-theme="night"] {
            --primary: #ff7b72;
            --accent: #f2cc60;
            --dark: #e6edf3;
            --bg: #121826;
            --sky: #182133;
            --leaf: #3fb950;
            --gray: #8b949e;
            --panel: #1d2433;
            --surface: #262f40;
            --border: #30363d;
            --primary-soft: #35262b;
            --success-soft: #1f3527;
            --tip-bg: #2b2230;
            --tip-text: #d2d7df;
            --drop-bg: #20293a;
            --drop-border: #465066;
            --tutor-bg: #2c2a1f;
            --tutor-border: #8b7d3f;
            --muted-text: #9aa4af;
            --subtle-text: #8b949e;
            --shadow-soft: 0 10px 24px rgba(0,0,0,0.35);
            color-scheme: dark;
        }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff'); }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--dark); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background-color 0.25s ease, color 0.25s ease; }

        /* [2] UI 스타일 */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.6s ease-in-out; }
        .intro-title { font-size: 2.5rem; font-weight: 900; color: var(--accent); text-shadow: 2px 2px 0 #a91b15; margin-top: 30px; text-align: center; }
        .start-btn { background: var(--accent); color: var(--primary); padding: 15px 50px; border: none; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 0 #c9a300; margin-top: 50px; }

        .header { height: 55px; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .logo-txt { font-weight: 900; font-size: 1.2rem; color: var(--primary); }
        .logo-badge { background: var(--accent); color: var(--primary); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; }
        .section { display: none; width: 100%; flex-direction: column; align-items: center; animation: fade 0.3s; }
        .section.active { display: flex; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--panel); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-weight: bold; color: var(--gray); cursor: pointer; font-size: 0.75rem; }
        .nav-btn.active { color: var(--primary); }

        .card { width: 100%; max-width: 340px; min-height: 280px; background: var(--panel); border-radius: 25px; box-shadow: 0 10px 25px rgba(218, 37, 29, 0.1); display: flex; flex-direction: column; padding: 25px; justify-content: space-between; margin-bottom: 20px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: linear-gradient(135deg, transparent 50%, var(--accent) 50%); opacity: 0.2; }
        .vn-txt { font-size: 2.2rem; font-weight: 900; margin: 15px 0 5px; color: var(--primary); line-height: 1.2; word-break: keep-all; }
        .pron-txt { font-size: 0.95rem; color: var(--subtle-text); margin-bottom: 10px; font-style: italic; }
        .kr-txt { font-size: 1.2rem; font-weight: bold; color: var(--dark); margin-bottom: 20px; }
        .tip-box { background: var(--tip-bg); border-left: 4px solid var(--primary); padding: 12px; border-radius: 8px; font-size: 0.85rem; color: var(--tip-text); line-height: 1.4; text-align: left;}

        .ctrl-box { display: flex; gap: 20px; align-items: center; margin-bottom: 10px; }
        .nav-arrow { border: none; background: var(--panel); width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; color: var(--gray); cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .spk-btn { background: var(--primary); color: var(--accent); border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; box-shadow: 0 6px 15px rgba(218, 37, 29, 0.3); display: flex; align-items: center; justify-content: center; }
        .spk-btn:active { transform: scale(0.95); }

        .slot-con { display: flex; gap: 4px; margin: 20px 0; justify-content: center; width: 100%; flex-wrap: wrap; }
        .slot { width: 23%; height: 80px; background: var(--panel); border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; text-align: center; color: var(--dark); flex-direction: column; transition: 0.3s; word-break: keep-all; padding: 2px; }
        .slot.verb { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
        .slot.obj { border-color: var(--leaf); color: var(--leaf); background: var(--success-soft); }
        .slot.hidden { display: none; }

        .btn-main { background: var(--dark); color: var(--accent); border: none; padding: 14px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1a252f; font-size: 1rem; width: 80%; max-width: 300px; margin-top:10px;}
        .result-box { margin-top: 20px; width: 100%; text-align: center; }
        .res-vn { font-size: 1.6rem; font-weight: 900; color: var(--primary); margin-bottom: 5px; }
        .res-kr { font-size: 1rem; color: var(--muted-text); font-weight: bold; }

        .puzzle-drop { width: 100%; min-height: 80px; background: var(--drop-bg); border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; margin-bottom: 20px; border: 2px dashed var(--drop-border); }
        .piece { padding: 8px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 var(--border); color: var(--dark); }
        .piece.verb { color: var(--primary); border-color: var(--primary); }
        .piece.used { opacity: 0.3; transform: scale(0.9); pointer-events: none; }

        /* AI Tutor Box */
        .ai-tutor-box { width: 100%; margin-top: 20px; padding: 15px; background: var(--tutor-bg); border: 2px solid var(--tutor-border); border-radius: 15px; text-align: left; font-size: 0.9rem; display: none; animation: fade 0.5s ease-out; box-shadow: var(--shadow-soft); margin-bottom: 20px;}
        .ai-label { font-size: 0.8rem; font-weight: 900; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .ai-voc-item { background: var(--panel); padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; color: var(--tip-text); border: 1px solid var(--border); display: inline-block; margin: 2px; }
        
        /* Daily Styles */
        .daily-card { width: 100%; background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow-soft); }
        .daily-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .day-badge { background: var(--dark); color: var(--accent); padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.9rem; }
        .prog-bar-bg { width: 100%; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 20px; }
        .prog-bar-fill { height: 100%; background: var(--leaf); width: 0%; transition: width 0.5s; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .task-item.done { border-color: var(--leaf); background: var(--success-soft); }
        .task-item.done .task-status { color: var(--leaf); }
        .task-status { font-size: 0.8rem; font-weight: bold; color: var(--gray); }
        .mission-clear { text-align: center; color: var(--leaf); font-weight: 900; font-size: 1.2rem; display: none; margin-top: 10px; animation: bounce 0.5s; }
        .pill-label { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 10px 20px; margin-bottom: 10px; font-weight: bold; color: var(--muted-text); font-size: 0.9rem; }
        .btn-link-muted { background: none; border: none; color: var(--gray); text-decoration: underline; font-size: 0.7rem; }
        .btn-secondary { background: var(--surface); color: var(--tip-text); border: 1px solid var(--border); box-shadow: none; font-size: 0.9rem; padding: 10px 20px; }

        .tabs { width: 100%; overflow-x: auto; display: flex; gap: 8px; padding: 5px 0 15px; scrollbar-width: none; flex-shrink: 0; }
        .tab { padding: 8px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; cursor: pointer; color: var(--gray); box-shadow: 0 2px 5px rgba(0,0,0,0.03); transition: 0.2s; }
        .tab.active { background: var(--dark); color: var(--accent); border-color: var(--dark); }

        .settings-card { width: 100%; background: var(--panel); border-radius: 20px; padding: 20px; box-shadow: var(--shadow-soft); }
        .settings-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 15px; }
        .settings-badge { background: var(--surface); border: 1px solid var(--border); color: var(--gray); padding: 6px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: bold; }
        .theme-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
        .theme-btn { border: 1px solid var(--border); background: var(--panel); color: var(--dark); border-radius: 16px; padding: 14px 12px; text-align: left; cursor: pointer; transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease; }
        .theme-btn:active { transform: scale(0.98); }
        .theme-btn.active { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(218, 37, 29, 0.18); }
        .theme-title { font-size: 0.95rem; font-weight: 900; margin-bottom: 8px; }
        .theme-meta { font-size: 0.75rem; color: var(--gray); margin-top: 8px; line-height: 1.4; }
        .theme-swatches { display: flex; gap: 6px; }
        .theme-swatch { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.08); }

        .non-la-wrap { position: relative; width: 200px; height: 150px; animation: float 3s infinite ease-in-out; }
        .non-la { width: 0; height: 0; border-left: 100px solid transparent; border-right: 100px solid transparent; border-bottom: 120px solid #eebb99; position: relative; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
        .non-la::after { content: ''; position: absolute; bottom: -110px; left: -100px; width: 200px; height: 120px; background: repeating-linear-gradient(transparent, transparent 19px, rgba(0,0,0,0.1) 20px); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .chin-strap { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); width: 180px; height: 60px; border-radius: 0 0 100px 100px; border: 4px solid #fff; border-top: 0; opacity: 0.8; }
        
        @keyframes float { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-15px) rotate(2deg)} }
        @keyframes fade { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    </style>
</head>
<body>
    <div id="intro-screen">
        <div class="non-la-wrap"><div class="non-la"></div><div class="chin-strap"></div></div>
        <div class="intro-title">SAIGON<br>CLASS</div>
        <button id="start-btn" class="start-btn">로딩 중... 🔄</button>
        <div id="status-log" style="color:white; font-size:0.7rem; margin-top:5px; opacity:0.8;"></div>
        <div style="color:rgba(255,255,255,0.7); margin-top:20px; font-size:0.8rem; font-weight:bold;">15분 완성! 베트남어 30일 챌린지 🇻🇳</div>
    </div>

    <div class="header">
        <div class="logo-txt">SAIGON CLASS</div>
        <div id="day-display" class="logo-badge">Day 1</div>
    </div>

    <div class="content-area">
        <section id="daily" class="section active">
            <div class="daily-card">
                <div class="daily-header">
                    <span style="font-weight:900; font-size:1.2rem;">📅 오늘의 목표</span>
                    <span id="daily-day-badge" class="day-badge">Day 1</span>
                </div>
                <div class="prog-bar-bg"><div id="daily-prog" class="prog-bar-fill"></div></div>
                <div class="task-list">
                    <div class="task-item" onclick="goTask('study')">
                        <div class="task-info"><span>📖</span> 카드 공부</div>
                        <div id="task-study" class="task-status">0 / 5</div>
                    </div>
                    <div class="task-item" onclick="goTask('lab')">
                        <div class="task-info"><span>🎰</span> 문장 만들기</div>
                        <div id="task-lab" class="task-status">0 / 3</div>
                    </div>
                    <div class="task-item" onclick="goTask('puzzle')">
                        <div class="task-info"><span>🧩</span> 문장 퍼즐</div>
                        <div id="task-puzzle" class="task-status">0 / 2</div>
                    </div>
                </div>
                <div id="mission-clear" class="mission-clear">🎉 오늘의 미션 완료!</div>
            </div>
            <div style="width:100%; text-align:center;">
                <button class="btn-link-muted" onclick="resetProgress()">초기화 (Reset)</button>
            </div>
            <div class="settings-card">
                <div class="settings-header">
                    <span style="font-weight:900; font-size:1.05rem;">🎨 환경 테마</span>
                    <span id="theme-status" class="settings-badge">시스템</span>
                </div>
                <div class="theme-grid">
                    <button class="theme-btn" type="button" data-theme-option="system" onclick="setThemeMode('system')">
                        <div class="theme-title">시스템</div>
                        <div class="theme-swatches">
                            <span class="theme-swatch" style="background:#FFFDF5;"></span>
                            <span class="theme-swatch" style="background:#121826;"></span>
                            <span class="theme-swatch" style="background:#FFCD00;"></span>
                        </div>
                        <div class="theme-meta">기기 다크 모드에 맞춰 자동 전환</div>
                    </button>
                    <button class="theme-btn" type="button" data-theme-option="light" onclick="setThemeMode('light')">
                        <div class="theme-title">라이트</div>
                        <div class="theme-swatches">
                            <span class="theme-swatch" style="background:#FFFDF5;"></span>
                            <span class="theme-swatch" style="background:#DA251D;"></span>
                            <span class="theme-swatch" style="background:#FFCD00;"></span>
                        </div>
                        <div class="theme-meta">기본 학습 화면 톤 유지</div>
                    </button>
                    <button class="theme-btn" type="button" data-theme-option="sunset" onclick="setThemeMode('sunset')">
                        <div class="theme-title">선셋</div>
                        <div class="theme-swatches">
                            <span class="theme-swatch" style="background:#fff4e6;"></span>
                            <span class="theme-swatch" style="background:#c94f3d;"></span>
                            <span class="theme-swatch" style="background:#ffd166;"></span>
                        </div>
                        <div class="theme-meta">따뜻한 노을 계열 색상</div>
                    </button>
                    <button class="theme-btn" type="button" data-theme-option="night" onclick="setThemeMode('night')">
                        <div class="theme-title">나이트</div>
                        <div class="theme-swatches">
                            <span class="theme-swatch" style="background:#121826;"></span>
                            <span class="theme-swatch" style="background:#1d2433;"></span>
                            <span class="theme-swatch" style="background:#ff7b72;"></span>
                        </div>
                        <div class="theme-meta">저조도 환경에 맞는 다크 테마</div>
                    </button>
                </div>
            </div>
        </section>

        <section id="study" class="section">
            <div class="tabs" id="cat-tabs"></div>
            <div class="card">
                <div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span id="st-tag" style="font-size:0.75rem; font-weight:bold; color:var(--gray);">#TAG</span>
                        <span style="font-size:1.2rem;">🇻🇳</span>
                    </div>
                    <div style="text-align:center; margin-top:10px;">
                        <div id="st-vn" class="vn-txt">...</div>
                        <div id="st-pron" class="pron-txt">...</div>
                        <div id="st-kr" class="kr-txt">...</div>
                    </div>
                </div>
                <div class="tip-box"><span style="color:var(--primary); font-weight:900;">💡 TIP:</span> <span id="st-tip">...</span></div>
            </div>
            <div class="ctrl-box">
                <button class="nav-arrow" onclick="navCard(-1)">❮</button>
                <button class="spk-btn" onclick="speak(curCard.vn)">🔊</button>
                <button class="nav-arrow" onclick="navCard(1)">❯</button>
            </div>
        </section>

        <section id="lab" class="section">
            <div class="pill-label">🎰 Pattern Based Engine</div>
            <div class="slot-con">
                <div id="sl1" class="slot"><span class="slot-label">Subject</span>?</div>
                <div id="sl2" class="slot verb"><span class="slot-label">Verb</span>?</div>
                <div id="sl3" class="slot obj"><span class="slot-label">Object</span>?</div>
                <div id="sl4" class="slot"><span class="slot-label">Mod</span>?</div>
            </div>
            <button class="btn-main" onclick="spin()">🎲 SPIN!</button>
            <div class="result-box" id="lab-res" style="opacity:0;">
                <div id="lb-vn" class="res-vn"></div>
                <div id="lb-kr" class="res-kr"></div>
            </div>
            <div id="ai-tutor-lab" class="ai-tutor-box"></div>
        </section>

        <section id="puzzle" class="section">
            <div style="text-align:center; width:100%; margin-bottom:15px;">
                <div style="color:var(--primary); font-weight:900; font-size:0.8rem; margin-bottom:5px;">MISSION</div>
                <div id="pz-mission" style="font-size:1.1rem; font-weight:bold;">Loading...</div>
            </div>
            <div id="pz-drop" class="puzzle-drop"></div>
            <div id="pz-board" class="puzzle-drop" style="background:transparent; border:none; min-height:auto;"></div>
            <div id="ai-tutor-puz" class="ai-tutor-box"></div>
            <button class="btn-main btn-secondary" onclick="initPuz()">🔄 다시 하기</button>
        </section>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="go('daily', this)"><span>📅</span>매일</button>
        <button class="nav-btn" onclick="go('study', this)"><span>📖</span>공부</button>
        <button class="nav-btn" onclick="go('lab', this)"><span>🧪</span>실험실</button>
        <button class="nav-btn" onclick="go('puzzle', this)"><span>🧩</span>퍼즐</button>
    </nav>

    <script>
        const PROXY = "https://api.allorigins.win/raw?url=";
        const RAW_STUDY = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbxRamFGatyrxIHYEdNw19y-k0Z3OBPm1JcVm1b3kCBXzsriEA1pxg4dmY4dTZrnbUkZVWvDEUUFaH/pub?gid=0&single=true&output=csv";
        const RAW_LOGIC = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbxRamFGatyrxIHYEdNw19y-k0Z3OBPm1JcVm1b3kCBXzsriEA1pxg4dmY4dTZrnbUkZVWvDEUUFaH/pub?gid=853179688&single=true&output=csv";
        const THEME_STORAGE_KEY = "saigon_theme";

        let DB_STUDY = {}; 
        let DB_LOGIC = { subjects: [], verbs: [], objects: [] };
        let curCat = "", curIdx = 0, curCard = {}, vnVoice = null;
        let dailyState = { day: 1, study: 0, lab: 0, puzzle: 0, complete: false };

        const getDailyGoal = (day) => ({ study: 5 + Math.floor(day/5), lab: 3 + Math.floor(day/10), puzzle: 2 + Math.floor(day/7) });
        const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const normalizeText = (value) => String(value || "").trim();
        const normalizeKey = (value) => normalizeText(value).toLowerCase();
        function pickWeighted(items) {
            const total = items.reduce((sum, item) => sum + (item.weight || 1), 0);
            let cursor = Math.random() * total;
            for(const item of items) {
                cursor -= (item.weight || 1);
                if(cursor <= 0) return item;
            }
            return items[items.length - 1];
        }

        function readThemeMode() {
            const saved = localStorage.getItem(THEME_STORAGE_KEY);
            return THEME_LABELS[saved] ? saved : "system";
        }
        function resolveTheme(mode) {
            if(mode === "system") {
                return window.matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "light";
            }
            return mode;
        }
        function updateThemeMeta(theme) {
            const meta = document.querySelector('meta[name="theme-color"]');
            if(meta) meta.setAttribute("content", THEME_COLORS[theme] || THEME_COLORS.light);
        }
        function updateThemeUi(mode, theme) {
            document.querySelectorAll("[data-theme-option]").forEach((btn) => {
                btn.classList.toggle("active", btn.dataset.themeOption === mode);
            });
            const status = document.getElementById("theme-status");
            if(status) {
                status.innerText = mode === "system" ? `시스템 (${THEME_LABELS[theme]})` : THEME_LABELS[mode];
            }
        }
        function applyTheme(mode, persist = true) {
            const resolvedTheme = resolveTheme(mode);
            document.documentElement.dataset.themeMode = mode;
            document.documentElement.dataset.theme = resolvedTheme;
            if(persist) localStorage.setItem(THEME_STORAGE_KEY, mode);
            updateThemeMeta(resolvedTheme);
            updateThemeUi(mode, resolvedTheme);
        }
        function setThemeMode(mode) {
            applyTheme(mode);
        }

        function hasFinalConsonant(word) {
            const txt = normalizeText(word);
            if(!txt) return false;
            const last = txt[txt.length - 1];
            const code = last.charCodeAt(0);
            if(code < 0xAC00 || code > 0xD7A3) return false;
            return ((code - 0xAC00) % 28) !== 0;
        }
        function subjectParticle(word) {
            return hasFinalConsonant(word) ? "이" : "가";
        }
        function objectParticle(word) {
            return hasFinalConsonant(word) ? "을" : "를";
        }
        function formatSubjectKr(word) {
            const txt = normalizeText(word);
            if(!txt) return "";
            return KR_SUBJECT_FORMS[txt] || `${txt}${subjectParticle(txt)}`;
        }
        function formatObjectKr(word) {
            const txt = normalizeText(word);
            if(!txt) return "";
            return KR_OBJECT_FORMS[txt] || `${txt}${objectParticle(txt)}`;
        }
        function toNegativeVerbKr(verbKr) {
            const txt = normalizeText(verbKr);
            if(!txt) return "";
            if(txt === "이다") return "아니다";
            if(txt === "있다") return "없다";
            if(txt.endsWith("하다")) return `${txt.slice(0, -2)}하지 않다`;
            if(txt.endsWith("다")) return `${txt.slice(0, -1)}지 않다`;
            return `${txt} 않다`;
        }
        function toQuestionCopulaKr(nounKr) {
            const txt = normalizeText(nounKr);
            if(!txt) return "맞나요?";
            return hasFinalConsonant(txt) ? `${txt}인가요?` : `${txt}인가요?`;
        }
        function formatIdentityNegativeKr(nounKr) {
            const txt = normalizeText(nounKr);
            if(!txt) return "아니다";
            return `${txt}${hasFinalConsonant(txt) ? "이" : "가"} 아니다`;
        }
        function uniquePush(list, item, fields) {
            const key = fields.map(field => normalizeKey(item[field])).join("::");
            if(!key.replace(/:/g, "")) return;
            if(!list.some(entry => fields.map(field => normalizeKey(entry[field])).join("::") === key)) {
                list.push(item);
            }
        }
        function inferVerbFamily(verb) {
            const reqObj = normalizeKey(verb.reqObj);
            if(verb.pattern === "GO") return "move";
            if(verb.pattern === "SVO" && (reqObj === "food" || reqObj === "drink")) return "consume";
            if(verb.pattern === "SVO" && reqObj === "vehicle") return "move";
            if(verb.pattern === "BE") return "state";
            return "all";
        }
        function inferGoMarker(verbVn) {
            const vn = normalizeKey(verbVn);
            if(["đi", "chạy", "bay", "dạo"].includes(vn)) return "đến";
            return "";
        }
        function inferComplementType(verbVn, reqObj) {
            const normalizedReq = normalizeKey(reqObj);
            if(normalizedReq && normalizedReq !== "none") return normalizedReq;
            return normalizeKey(verbVn) === "là" ? "person" : "place";
        }
        function normalizePattern(pattern, verbVn) {
            const raw = normalizeText(pattern).toUpperCase();
            if(raw) return raw;
            return normalizeKey(verbVn) === "ở" || normalizeKey(verbVn) === "là" ? "BE" : "SVO";
        }
        function createSubjectEntry(row) {
            return { vn: normalizeText(row[0]), kr: normalizeText(row[1]), type: "person" };
        }
        function createVerbEntry(row) {
            const vn = normalizeText(row[2]);
            const pattern = normalizePattern(row[4], vn);
            const reqObj = normalizeKey(row[5]) || (pattern === "GO" ? "place" : pattern === "SV" ? "none" : "");
            const verb = {
                vn,
                kr: normalizeText(row[3]),
                pattern,
                reqObj,
                destinationMarker: pattern === "GO" ? inferGoMarker(vn) : "",
                complementType: pattern === "BE" ? inferComplementType(vn, reqObj) : ""
            };
            verb.family = inferVerbFamily(verb);
            return verb;
        }
        function createObjectEntry(row) {
            return {
                vn: normalizeText(row[6]),
                kr: normalizeText(row[7]),
                type: normalizeKey(row[8]) || "generic"
            };
        }
        function pickObjectByType(type) {
            const normalizedType = normalizeKey(type);
            const candidates = DB_LOGIC.objects.filter(obj => !normalizedType || normalizedType === "generic" || obj.type === normalizedType);
            if(candidates.length > 0) return pickRandom(candidates);
            return DB_LOGIC.objects.length > 0 ? pickRandom(DB_LOGIC.objects) : null;
        }
        function chooseModifier(verb) {
            if(Math.random() <= 0.45) return EMPTY_MODIFIER;
            const candidates = MODIFIERS.filter((mod) => {
                const targetMatched = mod.targets.includes(verb.family) || mod.targets.includes("all");
                const verbMatched = !mod.verbs || mod.verbs.includes(verb.vn);
                return targetMatched && verbMatched;
            });
            return candidates.length > 0 ? pickRandom(candidates) : EMPTY_MODIFIER;
        }
        function chooseSentenceMode() {
            return pickWeighted(SENTENCE_MODES);
        }
        function joinSentence(parts) {
            return parts.filter(Boolean).join(" ").replace(/\s+\?/g, "?").trim();
        }
        function applySentenceEndModifier(parts, modifier, placementKey) {
            if(modifier.vn && modifier[placementKey] === "sentenceEnd") parts.push(modifier[placementKey === "vnPlacement" ? "vn" : "kr"]);
            return parts;
        }
        function finalizeStructure(vnParts, krParts, slots) {
            return { vnParts, krParts, slots: [...slots, ""].slice(0, 4) };
        }
        function buildSvoSentence(subject, verb, object, modifier) {
            const verbChunk = [verb.vn];
            if(modifier.vn && modifier.vnPlacement === "afterVerb") verbChunk.push(modifier.vn);
            const vnParts = [subject.vn, verbChunk.join(" "), object ? object.vn : ""];
            applySentenceEndModifier(vnParts, modifier, "vnPlacement");

            const krParts = [formatSubjectKr(subject.kr)];
            if(object && object.kr) krParts.push(formatObjectKr(object.kr));
            if(modifier.kr && modifier.krPlacement === "beforeVerb") krParts.push(modifier.kr);
            krParts.push(verb.kr);
            applySentenceEndModifier(krParts, modifier, "krPlacement");

            return finalizeStructure(vnParts, krParts, [subject.vn, verbChunk.join(" "), object ? object.vn : ""]);
        }
        function buildGoSentence(subject, verb, object, modifier) {
            const verbChunk = [verb.vn];
            if(modifier.vn && modifier.vnPlacement === "afterVerb") verbChunk.push(modifier.vn);
            if(verb.destinationMarker) verbChunk.push(verb.destinationMarker);
            const vnParts = [subject.vn, verbChunk.join(" "), object ? object.vn : ""];
            applySentenceEndModifier(vnParts, modifier, "vnPlacement");

            const krParts = [formatSubjectKr(subject.kr)];
            if(object && object.kr) krParts.push(`${object.kr}에`);
            if(modifier.kr && modifier.krPlacement === "beforeVerb") krParts.push(modifier.kr);
            krParts.push(verb.kr);
            applySentenceEndModifier(krParts, modifier, "krPlacement");

            return finalizeStructure(vnParts, krParts, [subject.vn, verbChunk.join(" "), object ? object.vn : ""]);
        }
        function buildSvSentence(subject, verb, modifier) {
            const verbChunk = [verb.vn];
            if(modifier.vn && modifier.vnPlacement === "afterVerb") verbChunk.push(modifier.vn);
            const vnParts = [subject.vn, verbChunk.join(" ")];
            applySentenceEndModifier(vnParts, modifier, "vnPlacement");

            const krParts = [formatSubjectKr(subject.kr)];
            if(modifier.kr && modifier.krPlacement === "beforeVerb") krParts.push(modifier.kr);
            krParts.push(verb.kr);
            applySentenceEndModifier(krParts, modifier, "krPlacement");

            return finalizeStructure(vnParts, krParts, [subject.vn, verbChunk.join(" "), ""]);
        }
        function buildBeSentence(subject, verb, object, modifier) {
            const vnParts = [subject.vn, verb.vn, object ? object.vn : ""];
            applySentenceEndModifier(vnParts, modifier, "vnPlacement");

            const krParts = [formatSubjectKr(subject.kr)];
            if(object && object.kr) {
                if(verb.complementType === "person") krParts.push(verb.kr === "이다" ? `${object.kr}${verb.kr}` : object.kr);
                else krParts.push(`${object.kr}에`);
            }
            if(!(object && object.kr && verb.complementType === "person" && verb.kr === "이다")) krParts.push(verb.kr);
            applySentenceEndModifier(krParts, modifier, "krPlacement");

            return finalizeStructure(vnParts, krParts, [subject.vn, verb.vn, object ? object.vn : ""]);
        }
        function applySentenceMode(base, subject, verb, object, mode) {
            const vnParts = [...base.vnParts];
            const krParts = [...base.krParts];
            const slots = [...base.slots];
            const isIdentityCopula = verb.pattern === "BE" && verb.complementType === "person" && normalizeKey(verb.vn) === "là";

            if(mode.id === "negative") {
                if(isIdentityCopula) {
                    slots[1] = "không phải là";
                    vnParts.splice(1, 1, "không phải là");
                    krParts.splice(1, krParts.length - 1, object && object.kr ? formatIdentityNegativeKr(object.kr) : "아니다");
                } else {
                    slots[1] = `không ${slots[1]}`.trim();
                    vnParts.splice(1, 1, slots[1]);
                    krParts[krParts.length - 1] = toNegativeVerbKr(krParts[krParts.length - 1]);
                }
            } else if(mode.id === "question") {
                if(isIdentityCopula) {
                    slots[1] = "có phải là";
                    slots[3] = "không?";
                    vnParts.splice(1, 1, "có phải là");
                    vnParts.push("không?");
                    krParts.splice(1, krParts.length - 1, object && object.kr ? toQuestionCopulaKr(object.kr) : "맞나요?");
                } else {
                    slots[1] = `có ${slots[1]}`.trim();
                    slots[3] = "không?";
                    vnParts.splice(1, 1, slots[1]);
                    vnParts.push("không?");
                    krParts.push(mode.krTag);
                }
            } else if(mode.id === "polite") {
                slots[3] = "ạ";
                vnParts.push("ạ");
                krParts.push(mode.krTag);
            } else if(mode.id === "soft") {
                slots[3] = "nhé";
                vnParts.push("nhé");
                krParts.push(mode.krTag);
            }

            return finalizeStructure(vnParts, krParts, slots);
        }

        // --- Core: Pattern Engine ---
        function generateSentence() {
            if(DB_LOGIC.subjects.length === 0 || DB_LOGIC.verbs.length === 0) return null;

            const subject = pickRandom(DB_LOGIC.subjects);
            const verb = pickRandom(DB_LOGIC.verbs);
            const modifier = chooseModifier(verb);
            const sentenceMode = chooseSentenceMode();
            let object = null;
            let built = null;

            if(verb.pattern === "SVO") {
                object = pickObjectByType(verb.reqObj);
                built = buildSvoSentence(subject, verb, object, modifier);
            } else if(verb.pattern === "GO") {
                object = pickObjectByType("place");
                built = buildGoSentence(subject, verb, object, modifier);
            } else if(verb.pattern === "SV") {
                built = buildSvSentence(subject, verb, modifier);
            } else if(verb.pattern === "BE") {
                object = pickObjectByType(verb.complementType);
                built = buildBeSentence(subject, verb, object, modifier);
            } else {
                object = pickObjectByType(verb.reqObj || "generic");
                built = buildSvoSentence(subject, verb, object, modifier);
            }
            const finalized = applySentenceMode(built, subject, verb, object, sentenceMode);

            return {
                s: subject,
                v: verb,
                o: object,
                m: modifier,
                mode: sentenceMode,
                prep: verb.destinationMarker || "",
                vn: joinSentence(finalized.vnParts),
                kr: joinSentence(finalized.krParts),
                slots: finalized.slots,
                patternMeta: PATTERN_META[verb.pattern] || PATTERN_META.SVO
            };
        }

        // --- AI Teacher ---
        function explainByAi(data) {
            if(!data) return "데이터 로딩 중...";

            const patternMeta = data.patternMeta || PATTERN_META[data.v.pattern] || PATTERN_META.SVO;
            const modeMeta = data.mode || SENTENCE_MODES[0];
            let vocList = `<span class="ai-voc-item">${data.s.vn}: ${data.s.kr}</span>`;
            vocList += `<span class="ai-voc-item">${data.v.vn}: ${data.v.kr}</span>`;
            if(data.o && data.o.vn) vocList += `<span class="ai-voc-item">${data.o.vn}: ${data.o.kr}</span>`;
            if(data.prep) vocList += `<span class="ai-voc-item">${data.prep}: (전치사)</span>`;
            if(data.m && data.m.vn) vocList += `<span class="ai-voc-item">${data.m.vn}: ${data.m.kr}</span>`;
            if(modeMeta.vnTag) vocList += `<span class="ai-voc-item">${modeMeta.vnTag}: ${modeMeta.label}</span>`;

            return `
                <div class="ai-voc-item" style="margin-bottom:8px; font-weight:900;">${patternMeta.label} · ${patternMeta.description}</div>
                <div class="ai-voc-item" style="margin-bottom:8px; font-weight:900;">문장 모드 · ${modeMeta.label}</div>
                <div class="ai-voc-list">${vocList}</div>
                <div style="font-weight:bold; color:#d35400;">💡 전체 해석:</div>
                <div style="font-size:1.1rem; font-weight:bold; color:#333; margin-bottom:5px;">"${data.kr}"</div>
                <div style="font-size:0.8rem; color:var(--muted-text);">👨‍🏫 패턴 규칙: ${patternMeta.tip}</div>
                <div style="font-size:0.8rem; color:var(--muted-text);">🗣️ 문장 모드 규칙: ${modeMeta.tip}</div>
            `;
        }

        // --- Init ---
        async function init() {
            try {
                window.speechSynthesis.onvoiceschanged = () => {
                    const voices = window.speechSynthesis.getVoices();
                    vnVoice = voices.find(v => v.lang.includes('vi') || v.name.includes('Viet'));
                };
                const ts = Date.now();
                
                // Fetch Study
                let txtStudy = "";
                try {
                    const resStudy = await fetch(PROXY + encodeURIComponent(RAW_STUDY + "&t=" + ts));
                    if(!resStudy.ok) throw new Error("404");
                    txtStudy = await resStudy.text();
                } catch(e) {
                    console.warn("Study Fail -> Use Fallback");
                    txtStudy = FALLBACK_STUDY.trim();
                }
                parseCSV(txtStudy).slice(1).forEach(r => {
                    if(r.length < 2) return;
                    const cat = r[0] || "기타";
                    if(!DB_STUDY[cat]) DB_STUDY[cat] = [];
                    DB_STUDY[cat].push({ vn: r[1], pron: r[2], kr: r[3], tip: r[4] || "" });
                });

                // Fetch Logic (9 Columns)
                let txtLogic = "";
                try {
                    const resLogic = await fetch(PROXY + encodeURIComponent(RAW_LOGIC + "&t=" + ts));
                    if(!resLogic.ok) throw new Error("Logic 404");
                    txtLogic = await resLogic.text();
                } catch(e) { 
                    console.warn("Logic Fail -> Fallback");
                    txtLogic = FALLBACK_LOGIC.trim();
                    document.getElementById('status-log').innerText = "오프라인 모드 (내장 데이터)";
                }

                // 패턴 데이터를 정규화해서 중복 없이 누적
                parseCSV(txtLogic).slice(1).forEach(r => {
                    if(r[0]) uniquePush(DB_LOGIC.subjects, createSubjectEntry(r), ["vn", "kr"]);
                    if(r[2]) uniquePush(DB_LOGIC.verbs, createVerbEntry(r), ["vn", "kr", "pattern", "reqObj"]);
                    if(r[6]) uniquePush(DB_LOGIC.objects, createObjectEntry(r), ["vn", "kr", "type"]);
                });

                renderTabs();
                const firstCat = Object.keys(DB_STUDY)[0];
                if(firstCat) setCat(firstCat);
                loadProgress();

                const btn = document.getElementById('start-btn');
                btn.innerText = "Xin Chào! 👋 (Start)";
                btn.onclick = () => document.getElementById('intro-screen').style.transform='translateY(-100%)';

            } catch(e) { 
                console.error(e);
            }
        }

        // --- Lab Logic ---
        function spin() {
            const data = generateSentence();
            if(!data) { alert("데이터 로딩 중입니다. 잠시만요!"); return; }
            checkMission('lab');

            const els = [document.getElementById('sl1'), document.getElementById('sl2'), document.getElementById('sl3'), document.getElementById('sl4')];
            els.forEach(e => { e.innerText = "..."; e.classList.remove('hidden'); });
            document.getElementById('ai-tutor-lab').style.display='none';

            setTimeout(() => {
                els[0].innerText = data.slots[0];
                els[1].innerText = data.slots[1];
                if (!data.slots[2]) els[2].classList.add('hidden'); else els[2].innerText = data.slots[2];
                if (!data.slots[3]) els[3].classList.add('hidden'); else els[3].innerText = data.slots[3];

                document.getElementById('lb-vn').innerText = data.vn;
                document.getElementById('lb-kr').innerText = ""; 
                
                document.getElementById('ai-tutor-lab').innerHTML = `<div class="ai-label">🤖 AI 분석</div>` + explainByAi(data);
                document.getElementById('ai-tutor-lab').style.display='block';
                
                speak(data.vn);
            }, 500);
        }

        // --- Puzzle Logic ---
        let pCur = [], pTgt = [], curPuzData = {};
        function initPuz() {
            const data = generateSentence();
            if(!data) { alert("데이터 로딩 중!"); return; }
            curPuzData = data;
            
            pTgt = data.slots.filter(s => s && s !== ""); 
            const missionTxt = data.kr; 

            document.getElementById('pz-mission').innerText = `"${missionTxt}"`;
            document.getElementById('pz-mission').style.color = "#333";
            
            pCur = [];
            document.getElementById('pz-drop').innerHTML = "";
            document.getElementById('pz-board').innerHTML = "";
            document.getElementById('ai-tutor-puz').style.display='none';

            let pieces = [...pTgt].sort(() => Math.random() - 0.5);
            pieces.forEach(txt => {
                const btn = document.createElement('div'); btn.className='piece';
                if(txt.includes(data.v.vn)) btn.classList.add('verb');
                btn.innerText = txt;
                btn.onclick = () => {
                    if(btn.classList.contains('used')) return;
                    btn.classList.add('used');
                    pCur.push(txt);
                    const clone = btn.cloneNode(true); clone.classList.remove('used'); clone.onclick=null;
                    document.getElementById('pz-drop').appendChild(clone);
                    checkPuz();
                };
                document.getElementById('pz-board').appendChild(btn);
            });
        }

        function checkPuz() {
            if(pCur.length === pTgt.length) {
                if(JSON.stringify(pCur) === JSON.stringify(pTgt)) {
                    document.getElementById('pz-mission').innerText = "🎉 정답! (Thành công)";
                    document.getElementById('pz-mission').style.color = "var(--primary)";
                    speak(curPuzData.vn);
                    
                    document.getElementById('ai-tutor-puz').innerHTML = `<div class="ai-label">🤖 정답 확인</div>` + explainByAi(curPuzData);
                    document.getElementById('ai-tutor-puz').style.display='block';
                    
                    checkMission('puzzle');
                } else {
                    document.getElementById('pz-mission').innerText = "❌ 땡! 다시 해보세요";
                    document.getElementById('pz-mission').style.color = "#c0392b";
                    setTimeout(() => {
                        document.getElementById('pz-drop').innerHTML = "";
                        document.querySelectorAll('.piece').forEach(p => p.classList.remove('used'));
                        pCur = [];
                        document.getElementById('pz-mission').innerText = `"${curPuzData.kr}"`;
                        document.getElementById('pz-mission').style.color = "#333";
                    }, 1000);
                }
            }
        }

        // Utils
        function loadProgress() {
            const saved = localStorage.getItem('saigon_daily');
            if(saved) dailyState = JSON.parse(saved);
            updateDailyUI();
        }
        function saveProgress() {
            localStorage.setItem('saigon_daily', JSON.stringify(dailyState));
            updateDailyUI();
        }
        function checkMission(type) {
            if(dailyState.complete) return;
            const goal = getDailyGoal(dailyState.day);
            if(type === 'study' && dailyState.study < goal.study) dailyState.study++;
            if(type === 'lab' && dailyState.lab < goal.lab) dailyState.lab++;
            if(type === 'puzzle' && dailyState.puzzle < goal.puzzle) dailyState.puzzle++;
            if(dailyState.study >= goal.study && dailyState.lab >= goal.lab && dailyState.puzzle >= goal.puzzle) {
                dailyState.complete = true;
                confettiEffect();
                setTimeout(() => {
                    alert("축하합니다! 오늘의 미션을 완료했습니다. 🎉");
                    if(dailyState.day < 30) { dailyState.day++; dailyState.study = 0; dailyState.lab = 0; dailyState.puzzle = 0; dailyState.complete = false; }
                    saveProgress();
                }, 1000);
            }
            saveProgress();
        }
        function updateDailyUI() {
            const goal = getDailyGoal(dailyState.day);
            document.getElementById('day-display').innerText = `Day ${dailyState.day}`;
            document.getElementById('daily-day-badge').innerText = `Day ${dailyState.day}`;
            document.getElementById('task-study').innerText = `${dailyState.study} / ${goal.study}`;
            document.getElementById('task-lab').innerText = `${dailyState.lab} / ${goal.lab}`;
            document.getElementById('task-puzzle').innerText = `${dailyState.puzzle} / ${goal.puzzle}`;
            document.querySelectorAll('.task-item')[0].classList.toggle('done', dailyState.study >= goal.study);
            document.querySelectorAll('.task-item')[1].classList.toggle('done', dailyState.lab >= goal.lab);
            document.querySelectorAll('.task-item')[2].classList.toggle('done', dailyState.puzzle >= goal.puzzle);
            const total = goal.study + goal.lab + goal.puzzle;
            const cur = dailyState.study + dailyState.lab + dailyState.puzzle;
            document.getElementById('daily-prog').style.width = Math.min(100, (cur/total)*100) + "%";
            document.getElementById('mission-clear').style.display = dailyState.complete ? 'block' : 'none';
        }
        function parseCSV(text) {
            const rows = []; let r=[], c='', q=false;
            for(let i=0; i<text.length; i++){ let cc=text[i]; if(cc=='"'){q=!q;}else if(cc==','&&!q){r.push(c.trim());c='';}else if(cc=='\n'&&!q){r.push(c.trim());rows.push(r);r=[];c='';}else{c+=cc;} }
            if(c) r.push(c.trim()); if(r.length>0) rows.push(r); return rows;
        }
        function renderTabs() {
            const con = document.getElementById('cat-tabs'); con.innerHTML = "";
            Object.keys(DB_STUDY).forEach(k => { const d=document.createElement('div'); d.className='tab'; d.innerText=k; d.onclick=()=>setCat(k); con.appendChild(d); });
        }
        function setCat(c) { curCat=c; curIdx=0; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.innerText===c)); updCard(); }
        function updCard() {
            if(!DB_STUDY[curCat]) return; const d=DB_STUDY[curCat][curIdx]; curCard=d;
            if(document.getElementById('st-tag')) document.getElementById('st-tag').innerText="#"+curCat; 
            document.getElementById('st-vn').innerText=d.vn;
            document.getElementById('st-pron').innerText=`[${d.pron}]`; document.getElementById('st-kr').innerText=d.kr;
            document.getElementById('st-tip').innerText=d.tip;
        }
        function navCard(n) { const len=DB_STUDY[curCat].length; curIdx+=n; if(curIdx<0)curIdx=len-1; if(curIdx>=len)curIdx=0; updCard(); if(n>0) checkMission('study'); }
        function speak(txt) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(txt)}&tl=vi&client=tw-ob`;
            new Audio(url).play().catch(()=>{ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(txt); if(vnVoice) m.voice=vnVoice; m.lang='vi-VN'; m.rate=0.8; window.speechSynthesis.speak(m); });
        }
        function go(id, el) {
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active');
            if(id==='puzzle') initPuz();
        }
        function goTask(type) { go(type, document.querySelector(`.nav-btn[onclick*="'${type}'"]`)); }
        function resetProgress() { if(confirm("초기화?")) { dailyState = { day: 1, study: 0, lab: 0, puzzle: 0, complete: false }; saveProgress(); } }
        function confettiEffect() { document.body.style.backgroundColor = "#fff9c4"; setTimeout(()=> document.body.style.backgroundColor = "", 300); }

        const themeMedia = window.matchMedia("(prefers-color-scheme: dark)");
        if(themeMedia.addEventListener) {
            themeMedia.addEventListener("change", () => {
                if(readThemeMode() === "system") applyTheme("system", false);
            });
        } else if(themeMedia.addListener) {
            themeMedia.addListener(() => {
                if(readThemeMode() === "system") applyTheme("system", false);
            });
        }

        applyTheme(readThemeMode(), false);
        init();
    </script>
</body>
</html>
