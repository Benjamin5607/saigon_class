<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Saigon Class 🇻🇳</title>
    <style>
        /* [1] 디자인 시스템 */
        :root {
            --primary: #DA251D;
            --accent: #FFCD00;
            --dark: #2c3e50;
            --text: #2c3e50;
            --bg: #FFFDF5;
            --sky: #fff;
            --surface: #fff;
            --soft-surface: #f8f9fa;
            --border: #eee;
            --tip-bg: #fdf6f6;
            --primary-soft: #fff5f5;
            --leaf: #27ae60;
            --leaf-soft: #f0fff4;
            --gray: #95a5a6;
            --muted: #888;
            --shadow: rgba(218, 37, 29, 0.1);
            --ai-bg: #fff9c4;
            --ai-border: #fbc02d;
            --ai-chip-bg: #fff;
            --ai-chip-text: #555;
        }
        body[data-theme="night"] {
            --primary: #ff6b6b;
            --accent: #ffd166;
            --dark: #111827;
            --text: #f8fafc;
            --bg: #0f172a;
            --sky: #111827;
            --surface: #1f2937;
            --soft-surface: #273449;
            --border: #374151;
            --tip-bg: #2a1f2b;
            --primary-soft: #33212a;
            --leaf: #5eead4;
            --leaf-soft: #173a3a;
            --gray: #94a3b8;
            --muted: #cbd5e1;
            --shadow: rgba(0, 0, 0, 0.35);
            --ai-bg: #342b1a;
            --ai-border: #f59e0b;
            --ai-chip-bg: #111827;
            --ai-chip-text: #f8fafc;
        }
        body[data-theme="tropical"] {
            --primary: #00897b;
            --accent: #ffca28;
            --dark: #17413d;
            --text: #17413d;
            --bg: #eefbf4;
            --sky: #f8fffb;
            --surface: #ffffff;
            --soft-surface: #e2f7ed;
            --border: #ccebdd;
            --tip-bg: #ecfff8;
            --primary-soft: #e0f7f4;
            --leaf: #2e7d32;
            --leaf-soft: #e8f5e9;
            --gray: #78909c;
            --muted: #607d8b;
            --shadow: rgba(0, 137, 123, 0.16);
            --ai-bg: #fff8d8;
            --ai-border: #fdd835;
            --ai-chip-bg: #ffffff;
            --ai-chip-text: #17413d;
        }
        @font-face { font-family: 'Pretendard'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff'); }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.25s ease, color 0.25s ease; }

        /* [2] UI 스타일 */
        #intro-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.6s ease-in-out; }
        .intro-title { font-size: 2.5rem; font-weight: 900; color: var(--accent); text-shadow: 2px 2px 0 #a91b15; margin-top: 30px; text-align: center; }
        .start-btn { background: var(--accent); color: var(--primary); padding: 15px 50px; border: none; border-radius: 50px; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 0 #c9a300; margin-top: 50px; }

        .header { height: 55px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; transition: background 0.25s ease, border-color 0.25s ease; }
        .logo-txt { font-weight: 900; font-size: 1.2rem; color: var(--primary); }
        .logo-badge { background: var(--accent); color: var(--primary); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .theme-toggle { border: 1px solid var(--border); background: var(--soft-surface); color: var(--text); border-radius: 999px; padding: 6px 10px; font-weight: 900; font-size: 0.75rem; cursor: pointer; }
        .theme-panel { position: fixed; top: 62px; right: 14px; width: min(300px, calc(100% - 28px)); background: var(--surface); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 12px 30px var(--shadow); padding: 14px; z-index: 150; display: none; }
        .theme-panel.open { display: block; animation: fade 0.2s; }
        .theme-panel-title { font-size: 0.9rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .theme-options { display: grid; gap: 8px; }
        .theme-option { width: 100%; border: 1px solid var(--border); background: var(--soft-surface); color: var(--text); border-radius: 14px; padding: 10px; display: flex; gap: 10px; align-items: center; text-align: left; cursor: pointer; }
        .theme-option.active { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-soft); }
        .theme-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--accent); color: var(--primary); flex-shrink: 0; }
        .theme-label { display: block; font-weight: 900; font-size: 0.9rem; }
        .theme-desc { display: block; color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; }
        .section { display: none; width: 100%; flex-direction: column; align-items: center; animation: fade 0.3s; }
        .section.active { display: flex; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; border: none; background: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-weight: bold; color: #ccc; cursor: pointer; font-size: 0.75rem; }
        .nav-btn.active { color: var(--primary); }

        .card { width: 100%; max-width: 340px; min-height: 280px; background: var(--surface); border-radius: 25px; box-shadow: 0 10px 25px var(--shadow); display: flex; flex-direction: column; padding: 25px; justify-content: space-between; margin-bottom: 20px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: linear-gradient(135deg, transparent 50%, var(--accent) 50%); opacity: 0.2; }
        .vn-txt { font-size: 2.2rem; font-weight: 900; margin: 15px 0 5px; color: var(--primary); line-height: 1.2; word-break: keep-all; }
        .pron-txt { font-size: 0.95rem; color: var(--muted); margin-bottom: 10px; font-style: italic; }
        .kr-txt { font-size: 1.2rem; font-weight: bold; color: var(--text); margin-bottom: 20px; }
        .tip-box { background: var(--tip-bg); border-left: 4px solid var(--primary); padding: 12px; border-radius: 8px; font-size: 0.85rem; color: var(--muted); line-height: 1.4; text-align: left;}

        .ctrl-box { display: flex; gap: 20px; align-items: center; margin-bottom: 10px; }
        .nav-arrow { border: none; background: var(--surface); width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; color: var(--muted); cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.05); }
        .spk-btn { background: var(--primary); color: var(--accent); border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; box-shadow: 0 6px 15px rgba(218, 37, 29, 0.3); display: flex; align-items: center; justify-content: center; }
        .spk-btn:active { transform: scale(0.95); }

        .slot-con { display: flex; gap: 4px; margin: 20px 0; justify-content: center; width: 100%; flex-wrap: wrap; }
        .slot { width: 23%; height: 80px; background: var(--surface); border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.7rem; text-align: center; color: var(--text); flex-direction: column; transition: 0.3s; word-break: keep-all; padding: 2px; }
        .slot.verb { border-color: var(--primary); color: var(--primary); background: var(--primary-soft); }
        .slot.obj { border-color: var(--leaf); color: var(--leaf); background: var(--leaf-soft); }
        .slot.hidden { display: none; }

        .btn-main { background: var(--dark); color: var(--accent); border: none; padding: 14px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1a252f; font-size: 1rem; width: 80%; max-width: 300px; margin-top:10px;}
        .result-box { margin-top: 20px; width: 100%; text-align: center; }
        .res-vn { font-size: 1.6rem; font-weight: 900; color: var(--primary); margin-bottom: 5px; }
        .res-kr { font-size: 1rem; color: var(--muted); font-weight: bold; }

        .puzzle-drop { width: 100%; min-height: 80px; background: var(--soft-surface); border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 15px; margin-bottom: 20px; border: 2px dashed var(--border); }
        .piece { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 var(--border); color: var(--text); }
        .piece.verb { color: var(--primary); border-color: var(--primary); }
        .piece.used { opacity: 0.3; transform: scale(0.9); pointer-events: none; }

        /* AI Tutor Box */
        .ai-tutor-box { width: 100%; margin-top: 20px; padding: 15px; background: var(--ai-bg); border: 2px solid var(--ai-border); border-radius: 15px; text-align: left; font-size: 0.9rem; display: none; animation: fade 0.5s ease-out; box-shadow: 0 5px 10px rgba(0,0,0,0.05); margin-bottom: 20px;}
        .ai-label { font-size: 0.8rem; font-weight: 900; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .ai-voc-item { background: var(--ai-chip-bg); padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; color: var(--ai-chip-text); border: 1px solid var(--border); display: inline-block; margin: 2px; }
        
        /* Daily Styles */
        .daily-card { width: 100%; background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .daily-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .day-badge { background: var(--dark); color: var(--accent); padding: 5px 12px; border-radius: 15px; font-weight: bold; font-size: 0.9rem; }
        .prog-bar-bg { width: 100%; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; margin-bottom: 20px; }
        .prog-bar-fill { height: 100%; background: var(--leaf); width: 0%; transition: width 0.5s; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--soft-surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .task-item.done { border-color: var(--leaf); background: var(--leaf-soft); }
        .task-item.done .task-status { color: var(--leaf); }
        .task-status { font-size: 0.8rem; font-weight: bold; color: var(--gray); }
        .mission-clear { text-align: center; color: var(--leaf); font-weight: 900; font-size: 1.2rem; display: none; margin-top: 10px; animation: bounce 0.5s; }

        .tabs { width: 100%; overflow-x: auto; display: flex; gap: 8px; padding: 5px 0 15px; scrollbar-width: none; flex-shrink: 0; }
        .tab { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; cursor: pointer; color: var(--muted); box-shadow: 0 2px 5px rgba(0,0,0,0.03); transition: 0.2s; }
        .tab.active { background: var(--dark); color: var(--accent); border-color: var(--dark); }
        .engine-label { background: var(--surface); padding: 10px 20px; border-radius: 20px; margin-bottom: 10px; font-weight: bold; color: var(--muted); font-size: 0.9rem; }

        .non-la-wrap { position: relative; width: 200px; height: 150px; animation: float 3s infinite ease-in-out; }
        .non-la { width: 0; height: 0; border-left: 100px solid transparent; border-right: 100px solid transparent; border-bottom: 120px solid #eebb99; position: relative; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
        .non-la::after { content: ''; position: absolute; bottom: -110px; left: -100px; width: 200px; height: 120px; background: repeating-linear-gradient(transparent, transparent 19px, rgba(0,0,0,0.1) 20px); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .chin-strap { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); width: 180px; height: 60px; border-radius: 0 0 100px 100px; border: 4px solid #fff; border-top: 0; opacity: 0.8; }
        
        @keyframes float { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-15px) rotate(2deg)} }
        @keyframes fade { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
        @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    </style>
</head>
<body>
    <div id="intro-screen">
        <div class="non-la-wrap"><div class="non-la"></div><div class="chin-strap"></div></div>
        <div class="intro-title">SAIGON<br>CLASS</div>
        <button id="start-btn" class="start-btn">로딩 중... 🔄</button>
        <div id="status-log" style="color:white; font-size:0.7rem; margin-top:5px; opacity:0.8;"></div>
        <div style="color:rgba(255,255,255,0.7); margin-top:20px; font-size:0.8rem; font-weight:bold;">15분 완성! 베트남어 30일 챌린지 🇻🇳</div>
    </div>

    <div class="header">
        <div class="logo-txt">SAIGON CLASS</div>
        <div class="header-actions">
            <button id="theme-toggle" class="theme-toggle" type="button" aria-expanded="false" aria-controls="theme-panel" onclick="toggleThemePanel()">🎨 테마</button>
            <div id="day-display" class="logo-badge">Day 1</div>
        </div>
    </div>

    <div id="theme-panel" class="theme-panel" aria-hidden="true">
        <div class="theme-panel-title">환경 테마 설정</div>
        <div id="theme-options" class="theme-options"></div>
    </div>

    <div class="content-area">
        <section id="daily" class="section active">
            <div class="daily-card">
                <div class="daily-header">
                    <span style="font-weight:900; font-size:1.2rem;">📅 오늘의 목표</span>
                    <span id="daily-day-badge" class="day-badge">Day 1</span>
                </div>
                <div class="prog-bar-bg"><div id="daily-prog" class="prog-bar-fill"></div></div>
                <div class="task-list">
                    <div class="task-item" onclick="goTask('study')">
                        <div class="task-info"><span>📖</span> 카드 공부</div>
                        <div id="task-study" class="task-status">0 / 5</div>
                    </div>
                    <div class="task-item" onclick="goTask('lab')">
                        <div class="task-info"><span>🎰</span> 문장 만들기</div>
                        <div id="task-lab" class="task-status">0 / 3</div>
                    </div>
                    <div class="task-item" onclick="goTask('puzzle')">
                        <div class="task-info"><span>🧩</span> 문장 퍼즐</div>
                        <div id="task-puzzle" class="task-status">0 / 2</div>
                    </div>
                </div>
                <div id="mission-clear" class="mission-clear">🎉 오늘의 미션 완료!</div>
            </div>
            <div style="width:100%; text-align:center;">
                <button onclick="resetProgress()" style="background:none; border:none; color:#ccc; text-decoration:underline; font-size:0.7rem;">초기화 (Reset)</button>
            </div>
        </section>

        <section id="study" class="section">
            <div class="tabs" id="cat-tabs"></div>
            <div class="card">
                <div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <span id="st-tag" style="font-size:0.75rem; font-weight:bold; color:#aaa;">#TAG</span>
                        <span style="font-size:1.2rem;">🇻🇳</span>
                    </div>
                    <div style="text-align:center; margin-top:10px;">
                        <div id="st-vn" class="vn-txt">...</div>
                        <div id="st-pron" class="pron-txt">...</div>
                        <div id="st-kr" class="kr-txt">...</div>
                    </div>
                </div>
                <div class="tip-box"><span style="color:var(--primary); font-weight:900;">💡 TIP:</span> <span id="st-tip">...</span></div>
            </div>
            <div class="ctrl-box">
                <button class="nav-arrow" onclick="navCard(-1)">❮</button>
                <button class="spk-btn" onclick="speak(curCard.vn)">🔊</button>
                <button class="nav-arrow" onclick="navCard(1)">❯</button>
            </div>
        </section>

        <section id="lab" class="section">
            <div class="engine-label">🎰 Pattern Based Engine</div>
            <div class="slot-con">
                <div id="sl1" class="slot"><span class="slot-label">Subject</span>?</div>
                <div id="sl2" class="slot verb"><span class="slot-label">Verb</span>?</div>
                <div id="sl3" class="slot obj"><span class="slot-label">Object</span>?</div>
                <div id="sl4" class="slot"><span class="slot-label">Mod</span>?</div>
            </div>
            <button class="btn-main" onclick="spin()">🎲 SPIN!</button>
            <div class="result-box" id="lab-res" style="opacity:0;">
                <div id="lb-vn" class="res-vn"></div>
                <div id="lb-kr" class="res-kr"></div>
            </div>
            <div id="ai-tutor-lab" class="ai-tutor-box"></div>
        </section>

        <section id="puzzle" class="section">
            <div style="text-align:center; width:100%; margin-bottom:15px;">
                <div style="color:var(--primary); font-weight:900; font-size:0.8rem; margin-bottom:5px;">MISSION</div>
                <div id="pz-mission" style="font-size:1.1rem; font-weight:bold;">Loading...</div>
            </div>
            <div id="pz-drop" class="puzzle-drop"></div>
            <div id="pz-board" class="puzzle-drop" style="background:transparent; border:none; min-height:auto;"></div>
            <div id="ai-tutor-puz" class="ai-tutor-box"></div>
            <button class="btn-main" style="background:#ddd; color:#555; font-size:0.9rem; padding:10px 20px;" onclick="initPuz()">🔄 다시 하기</button>
        </section>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" onclick="go('daily', this)"><span>📅</span>매일</button>
        <button class="nav-btn" onclick="go('study', this)"><span>📖</span>공부</button>
        <button class="nav-btn" onclick="go('lab', this)"><span>🧪</span>실험실</button>
        <button class="nav-btn" onclick="go('puzzle', this)"><span>🧩</span>퍼즐</button>
    </nav>

    <script>
        const PROXY = "https://api.allorigins.win/raw?url=";
        const RAW_STUDY = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbxRamFGatyrxIHYEdNw19y-k0Z3OBPm1JcVm1b3kCBXzsriEA1pxg4dmY4dTZrnbUkZVWvDEUUFaH/pub?gid=0&single=true&output=csv";
        const RAW_LOGIC = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTbxRamFGatyrxIHYEdNw19y-k0Z3OBPm1JcVm1b3kCBXzsriEA1pxg4dmY4dTZrnbUkZVWvDEUUFaH/pub?gid=853179688&single=true&output=csv";
        const THEME_STORAGE_KEY = "saigon_theme";
        const THEMES = [
            { id: "saigon", icon: "🇻🇳", label: "사이공", desc: "따뜻한 기본 컬러" },
            { id: "night", icon: "🌙", label: "야간", desc: "어두운 환경에서 편안하게" },
            { id: "tropical", icon: "🌿", label: "트로피컬", desc: "초록빛 집중 모드" }
        ];

        // 🔥 [비상용 데이터] 시트 로딩 실패 시 사용
        const FALLBACK_LOGIC = `S_VN,S_KR,V_VN,V_KR,Pattern,Req_Type,O_VN,O_KR,O_Type
Tôi,나,ăn,먹다,SVO,food,Phở,쌀국수,food
Bạn,너,uống,마시다,SVO,drink,Cà phê,커피,drink
Anh ấy,그,đi,가다,GO,place,Sài Gòn,사이공,place
Em bé,아기,ngủ,자다,SV,none,Nhà,집,place
Bác tài,기사님,lái,운전하다,SVO,vehicle,Taxi,택시,vehicle`;

        const FALLBACK_STUDY = `Category,VN,Pron,KR,Tip
기본,Xin chào,씬 짜오,안녕하세요,웃으며 인사해요
기본,Cảm ơn,깜 언,고맙습니다,가볍게 고개 숙여요`;

        // 🔥 [수식어] 데이터베이스에 없으므로 코드에 내장 (필수!)
        const MODIFIERS = [
            {vn:"ngon", kr:"맛있게", target:"consume"},
            {vn:"nhiều", kr:"많이", target:"consume"},
            {vn:"nhanh", kr:"빨리", target:"move"},
            {vn:"chậm", kr:"천천히", target:"move"},
            {vn:"sớm", kr:"일찍", target:"move"},
            {vn:"vui", kr:"즐겁게", target:"feel"},
            {vn:"lắm", kr:"매우", target:"feel"},
            {vn:"quá", kr:"너무", target:"feel"},
            {vn:"nhé", kr:"~할게(요)", target:"all"},
            {vn:"không?", kr:"~니?", target:"all"},
            {vn:"ạ", kr:"~요(존대)", target:"all"}
        ];

        let DB_STUDY = {}; 
        let DB_LOGIC = { subjects: [], verbs: [], objects: [] };
        let curCat = "", curIdx = 0, curCard = {}, vnVoice = null;
        let dailyState = { day: 1, study: 0, lab: 0, puzzle: 0, complete: false };
        let currentTheme = "saigon";

        const getDailyGoal = (day) => ({ study: 5 + Math.floor(day/5), lab: 3 + Math.floor(day/10), puzzle: 2 + Math.floor(day/7) });

        // --- Core: Pattern Engine ---
        function generateSentence() {
            const r = (arr) => arr[Math.floor(Math.random() * arr.length)];
            if(DB_LOGIC.subjects.length === 0) return null;

            const v = r(DB_LOGIC.verbs);
            const s = r(DB_LOGIC.subjects); // 주어는 일단 랜덤 (데이터에 타입이 없으므로)

            let o = null;
            let prep = "";
            let sentenceVN = "", sentenceKR = "";
            let slots = []; 

            // 2. 패턴별 문장 조립
            if (v.pattern === "SVO") {
                let possibleObjs = DB_LOGIC.objects.filter(obj => obj.type === v.reqObj);
                if(possibleObjs.length === 0) possibleObjs = DB_LOGIC.objects; 
                o = r(possibleObjs);
                sentenceVN = `${s.vn} ${v.vn} ${o.vn}`;
                sentenceKR = `${s.kr}(이/가) ${o.kr}을/를 ${v.kr}`;
                slots = [s.vn, v.vn, o.vn];

            } else if (v.pattern === "GO") {
                let possibleObjs = DB_LOGIC.objects.filter(obj => obj.type === "place");
                o = r(possibleObjs);
                prep = (v.vn === "đến") ? "từ" : "đến";
                if(v.vn === "đến" && v.kr === "오다") prep = "từ";
                else prep = "đến";

                sentenceVN = `${s.vn} ${v.vn} ${prep} ${o.vn}`;
                sentenceKR = `${s.kr}(이/가) ${o.kr}${prep==='đến'?'에':'에서'} ${v.kr}`;
                slots = [s.vn, `${v.vn} ${prep}`, o.vn];

            } else if (v.pattern === "SV") {
                sentenceVN = `${s.vn} ${v.vn}`;
                sentenceKR = `${s.kr}(이/가) ${v.kr}`;
                slots = [s.vn, v.vn, ""];

            } else if (v.pattern === "BE") {
                let targetType = (v.vn === "ở") ? "place" : "person";
                let possibleObjs = DB_LOGIC.objects.filter(obj => obj.type === targetType);
                if(possibleObjs.length===0) possibleObjs = DB_LOGIC.objects;
                o = r(possibleObjs);
                sentenceVN = `${s.vn} ${v.vn} ${o.vn}`;
                sentenceKR = `${s.kr}(이/가) ${o.kr}에/입니다`;
                slots = [s.vn, v.vn, o.vn];
            } else { // Fallback
                o = r(DB_LOGIC.objects);
                sentenceVN = `${s.vn} ${v.vn} ${o.vn}`;
                sentenceKR = `${s.kr} ${o.kr} ${v.kr}`;
                slots = [s.vn, v.vn, o.vn];
            }

            // 3. 수식어 (내장 데이터 사용)
            // 수식어는 50% 확률로 붙임
            let m = {vn:"", kr:""};
            if(Math.random() > 0.5) {
                const targetModType = (v.pattern === 'GO') ? 'move' : (v.reqObj === 'food' || v.reqObj === 'drink' ? 'consume' : 'all');
                const possibleMods = MODIFIERS.filter(md => md.target === targetModType || md.target === 'all');
                if(possibleMods.length > 0) m = r(possibleMods);
            }

            if(m.vn) {
                sentenceVN += ` ${m.vn}`;
                sentenceKR += ` ${m.kr}`;
                slots.push(m.vn);
            } else {
                slots.push("");
            }

            return { s, v, o, m, prep, vn: sentenceVN, kr: sentenceKR, slots };
        }

        // --- AI Teacher ---
        function explainByAi(data) {
            if(!data) return "데이터 로딩 중...";
            
            let vocList = `<span class="ai-voc-item">${data.s.vn}: ${data.s.kr}</span>`;
            vocList += `<span class="ai-voc-item">${data.v.vn}: ${data.v.kr}</span>`;
            if(data.o && data.o.vn) vocList += `<span class="ai-voc-item">${data.o.vn}: ${data.o.kr}</span>`;
            if(data.prep) vocList += `<span class="ai-voc-item">${data.prep}: (전치사)</span>`;
            if(data.m && data.m.vn) vocList += `<span class="ai-voc-item">${data.m.vn}: ${data.m.kr}</span>`;

            let tip = "";
            if(data.v.reqObj === 'food' || data.v.reqObj === 'drink') tip = "먹고 마시는 동사에는 맛 표현(ngon)이 어울려요.";
            else if(data.v.pattern === 'GO') tip = "이동 동사에는 전치사(đến/từ)와 장소가 필수입니다.";
            else if(data.v.pattern === 'SV') tip = "목적어가 필요 없는 자동사(SV) 문장입니다.";
            else tip = "주어 + 동사 + 목적어 구조의 가장 기본적인 문장입니다.";

            return `
                <div class="ai-voc-list">${vocList}</div>
                <div style="font-weight:bold; color:#d35400;">💡 전체 해석:</div>
                <div style="font-size:1.1rem; font-weight:bold; color:var(--text); margin-bottom:5px;">"${data.kr}"</div>
                <div style="font-size:0.8rem; color:var(--muted);">👨‍🏫 Tip: ${tip}</div>
            `;
        }

        // --- Theme Settings ---
        function setupThemeSettings() {
            renderThemeOptions();
            applyTheme(localStorage.getItem(THEME_STORAGE_KEY) || "saigon", false);
            document.addEventListener('click', (event) => {
                const panel = document.getElementById('theme-panel');
                const toggle = document.getElementById('theme-toggle');
                if(!panel || !toggle || !panel.classList.contains('open')) return;
                if(panel.contains(event.target) || toggle.contains(event.target)) return;
                closeThemePanel();
            });
            document.addEventListener('keydown', (event) => {
                if(event.key === 'Escape') closeThemePanel();
            });
        }

        function renderThemeOptions() {
            const con = document.getElementById('theme-options');
            if(!con) return;
            con.innerHTML = "";
            THEMES.forEach(theme => {
                const btn = document.createElement('button');
                btn.type = "button";
                btn.className = "theme-option";
                btn.dataset.theme = theme.id;
                btn.innerHTML = `
                    <span class="theme-icon">${theme.icon}</span>
                    <span>
                        <span class="theme-label">${theme.label}</span>
                        <span class="theme-desc">${theme.desc}</span>
                    </span>
                `;
                btn.onclick = () => {
                    applyTheme(theme.id);
                    closeThemePanel();
                };
                con.appendChild(btn);
            });
        }

        function applyTheme(themeId, shouldSave = true) {
            const nextTheme = THEMES.some(theme => theme.id === themeId) ? themeId : "saigon";
            currentTheme = nextTheme;
            document.body.dataset.theme = nextTheme;
            if(shouldSave) localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
            updateThemeUI();
        }

        function updateThemeUI() {
            document.querySelectorAll('.theme-option').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === currentTheme);
            });
        }

        function toggleThemePanel() {
            const panel = document.getElementById('theme-panel');
            const toggle = document.getElementById('theme-toggle');
            if(!panel || !toggle) return;
            const isOpen = !panel.classList.contains('open');
            panel.classList.toggle('open', isOpen);
            panel.setAttribute('aria-hidden', String(!isOpen));
            toggle.setAttribute('aria-expanded', String(isOpen));
        }

        function closeThemePanel() {
            const panel = document.getElementById('theme-panel');
            const toggle = document.getElementById('theme-toggle');
            if(!panel || !toggle) return;
            panel.classList.remove('open');
            panel.setAttribute('aria-hidden', 'true');
            toggle.setAttribute('aria-expanded', 'false');
        }

        // --- Init ---
        async function init() {
            try {
                setupThemeSettings();
                window.speechSynthesis.onvoiceschanged = () => {
                    const voices = window.speechSynthesis.getVoices();
                    vnVoice = voices.find(v => v.lang.includes('vi') || v.name.includes('Viet'));
                };
                const ts = Date.now();
                
                // Fetch Study
                let txtStudy = "";
                try {
                    const resStudy = await fetch(PROXY + encodeURIComponent(RAW_STUDY + "&t=" + ts));
                    if(!resStudy.ok) throw new Error("404");
                    txtStudy = await resStudy.text();
                } catch(e) {
                    console.warn("Study Fail -> Use Fallback");
                    txtStudy = FALLBACK_STUDY.trim();
                }
                parseCSV(txtStudy).slice(1).forEach(r => {
                    if(r.length < 2) return;
                    const cat = r[0] || "기타";
                    if(!DB_STUDY[cat]) DB_STUDY[cat] = [];
                    DB_STUDY[cat].push({ vn: r[1], pron: r[2], kr: r[3], tip: r[4] || "" });
                });

                // Fetch Logic (9 Columns)
                let txtLogic = "";
                try {
                    const resLogic = await fetch(PROXY + encodeURIComponent(RAW_LOGIC + "&t=" + ts));
                    if(!resLogic.ok) throw new Error("Logic 404");
                    txtLogic = await resLogic.text();
                } catch(e) { 
                    console.warn("Logic Fail -> Fallback");
                    txtLogic = FALLBACK_LOGIC.trim();
                    document.getElementById('status-log').innerText = "오프라인 모드 (내장 데이터)";
                }

                // 🔥 [수정] 정확한 9열 매핑 (S:0,1 | V:2,3,4,5 | O:6,7,8)
                parseCSV(txtLogic).slice(1).forEach(r => {
                    if(r[0]) DB_LOGIC.subjects.push({ vn:r[0], kr:r[1], type:"person" }); // 주어 타입 임의지정
                    if(r[2]) DB_LOGIC.verbs.push({ vn:r[2], kr:r[3], pattern:r[4], reqObj:r[5] });
                    if(r[6]) DB_LOGIC.objects.push({ vn:r[6], kr:r[7], type:r[8] });
                });

                renderTabs();
                const firstCat = Object.keys(DB_STUDY)[0];
                if(firstCat) setCat(firstCat);
                loadProgress();

                const btn = document.getElementById('start-btn');
                btn.innerText = "Xin Chào! 👋 (Start)";
                btn.onclick = () => document.getElementById('intro-screen').style.transform='translateY(-100%)';

            } catch(e) { 
                console.error(e);
            }
        }

        // --- Lab Logic ---
        function spin() {
            const data = generateSentence();
            if(!data) { alert("데이터 로딩 중입니다. 잠시만요!"); return; }
            checkMission('lab');

            const els = [document.getElementById('sl1'), document.getElementById('sl2'), document.getElementById('sl3'), document.getElementById('sl4')];
            els.forEach(e => { e.innerText = "..."; e.classList.remove('hidden'); });
            document.getElementById('ai-tutor-lab').style.display='none';

            setTimeout(() => {
                els[0].innerText = data.slots[0];
                els[1].innerText = data.slots[1];
                if (!data.slots[2]) els[2].classList.add('hidden'); else els[2].innerText = data.slots[2];
                if (!data.slots[3]) els[3].classList.add('hidden'); else els[3].innerText = data.slots[3];

                document.getElementById('lb-vn').innerText = data.vn;
                document.getElementById('lb-kr').innerText = ""; 
                
                document.getElementById('ai-tutor-lab').innerHTML = `<div class="ai-label">🤖 AI 분석</div>` + explainByAi(data);
                document.getElementById('ai-tutor-lab').style.display='block';
                
                speak(data.vn);
            }, 500);
        }

        // --- Puzzle Logic ---
        let pCur = [], pTgt = [], curPuzData = {};
        function initPuz() {
            const data = generateSentence();
            if(!data) { alert("데이터 로딩 중!"); return; }
            curPuzData = data;
            
            pTgt = data.slots.filter(s => s && s !== ""); 
            const missionTxt = data.kr; 

            document.getElementById('pz-mission').innerText = `"${missionTxt}"`;
            document.getElementById('pz-mission').style.color = "var(--text)";
            
            pCur = [];
            document.getElementById('pz-drop').innerHTML = "";
            document.getElementById('pz-board').innerHTML = "";
            document.getElementById('ai-tutor-puz').style.display='none';

            let pieces = [...pTgt].sort(() => Math.random() - 0.5);
            pieces.forEach(txt => {
                const btn = document.createElement('div'); btn.className='piece';
                if(txt.includes(data.v.vn)) btn.classList.add('verb');
                btn.innerText = txt;
                btn.onclick = () => {
                    if(btn.classList.contains('used')) return;
                    btn.classList.add('used');
                    pCur.push(txt);
                    const clone = btn.cloneNode(true); clone.classList.remove('used'); clone.onclick=null;
                    document.getElementById('pz-drop').appendChild(clone);
                    checkPuz();
                };
                document.getElementById('pz-board').appendChild(btn);
            });
        }

        function checkPuz() {
            if(pCur.length === pTgt.length) {
                if(JSON.stringify(pCur) === JSON.stringify(pTgt)) {
                    document.getElementById('pz-mission').innerText = "🎉 정답! (Thành công)";
                    document.getElementById('pz-mission').style.color = "var(--primary)";
                    speak(curPuzData.vn);
                    
                    document.getElementById('ai-tutor-puz').innerHTML = `<div class="ai-label">🤖 정답 확인</div>` + explainByAi(curPuzData);
                    document.getElementById('ai-tutor-puz').style.display='block';
                    
                    checkMission('puzzle');
                } else {
                    document.getElementById('pz-mission').innerText = "❌ 땡! 다시 해보세요";
                    document.getElementById('pz-mission').style.color = "#c0392b";
                    setTimeout(() => {
                        document.getElementById('pz-drop').innerHTML = "";
                        document.querySelectorAll('.piece').forEach(p => p.classList.remove('used'));
                        pCur = [];
                        document.getElementById('pz-mission').innerText = `"${curPuzData.kr}"`;
                        document.getElementById('pz-mission').style.color = "var(--text)";
                    }, 1000);
                }
            }
        }

        // Utils
        function loadProgress() {
            const saved = localStorage.getItem('saigon_daily');
            if(saved) dailyState = JSON.parse(saved);
            updateDailyUI();
        }
        function saveProgress() {
            localStorage.setItem('saigon_daily', JSON.stringify(dailyState));
            updateDailyUI();
        }
        function checkMission(type) {
            if(dailyState.complete) return;
            const goal = getDailyGoal(dailyState.day);
            if(type === 'study' && dailyState.study < goal.study) dailyState.study++;
            if(type === 'lab' && dailyState.lab < goal.lab) dailyState.lab++;
            if(type === 'puzzle' && dailyState.puzzle < goal.puzzle) dailyState.puzzle++;
            if(dailyState.study >= goal.study && dailyState.lab >= goal.lab && dailyState.puzzle >= goal.puzzle) {
                dailyState.complete = true;
                confettiEffect();
                setTimeout(() => {
                    alert("축하합니다! 오늘의 미션을 완료했습니다. 🎉");
                    if(dailyState.day < 30) { dailyState.day++; dailyState.study = 0; dailyState.lab = 0; dailyState.puzzle = 0; dailyState.complete = false; }
                    saveProgress();
                }, 1000);
            }
            saveProgress();
        }
        function updateDailyUI() {
            const goal = getDailyGoal(dailyState.day);
            document.getElementById('day-display').innerText = `Day ${dailyState.day}`;
            document.getElementById('daily-day-badge').innerText = `Day ${dailyState.day}`;
            document.getElementById('task-study').innerText = `${dailyState.study} / ${goal.study}`;
            document.getElementById('task-lab').innerText = `${dailyState.lab} / ${goal.lab}`;
            document.getElementById('task-puzzle').innerText = `${dailyState.puzzle} / ${goal.puzzle}`;
            document.querySelectorAll('.task-item')[0].classList.toggle('done', dailyState.study >= goal.study);
            document.querySelectorAll('.task-item')[1].classList.toggle('done', dailyState.lab >= goal.lab);
            document.querySelectorAll('.task-item')[2].classList.toggle('done', dailyState.puzzle >= goal.puzzle);
            const total = goal.study + goal.lab + goal.puzzle;
            const cur = dailyState.study + dailyState.lab + dailyState.puzzle;
            document.getElementById('daily-prog').style.width = Math.min(100, (cur/total)*100) + "%";
            document.getElementById('mission-clear').style.display = dailyState.complete ? 'block' : 'none';
        }
        function parseCSV(text) {
            const rows = []; let r=[], c='', q=false;
            for(let i=0; i<text.length; i++){ let cc=text[i]; if(cc=='"'){q=!q;}else if(cc==','&&!q){r.push(c.trim());c='';}else if(cc=='\n'&&!q){r.push(c.trim());rows.push(r);r=[];c='';}else{c+=cc;} }
            if(c) r.push(c.trim()); if(r.length>0) rows.push(r); return rows;
        }
        function renderTabs() {
            const con = document.getElementById('cat-tabs'); con.innerHTML = "";
            Object.keys(DB_STUDY).forEach(k => { const d=document.createElement('div'); d.className='tab'; d.innerText=k; d.onclick=()=>setCat(k); con.appendChild(d); });
        }
        function setCat(c) { curCat=c; curIdx=0; document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.innerText===c)); updCard(); }
        function updCard() {
            if(!DB_STUDY[curCat]) return; const d=DB_STUDY[curCat][curIdx]; curCard=d;
            if(document.getElementById('st-tag')) document.getElementById('st-tag').innerText="#"+curCat; 
            document.getElementById('st-vn').innerText=d.vn;
            document.getElementById('st-pron').innerText=`[${d.pron}]`; document.getElementById('st-kr').innerText=d.kr;
            document.getElementById('st-tip').innerText=d.tip;
        }
        function navCard(n) { const len=DB_STUDY[curCat].length; curIdx+=n; if(curIdx<0)curIdx=len-1; if(curIdx>=len)curIdx=0; updCard(); if(n>0) checkMission('study'); }
        function speak(txt) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(txt)}&tl=vi&client=tw-ob`;
            new Audio(url).play().catch(()=>{ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(txt); if(vnVoice) m.voice=vnVoice; m.lang='vi-VN'; m.rate=0.8; window.speechSynthesis.speak(m); });
        }
        function go(id, el) {
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active');
            if(id==='puzzle') initPuz();
        }
        function goTask(type) { go(type, document.querySelector(`.nav-btn[onclick*="'${type}'"]`)); }
        function resetProgress() { if(confirm("초기화?")) { dailyState = { day: 1, study: 0, lab: 0, puzzle: 0, complete: false }; saveProgress(); } }
        function confettiEffect() { document.body.style.backgroundColor = "var(--tip-bg)"; setTimeout(()=> document.body.style.backgroundColor = "", 300); }

        init();
    </script>
</body>
</html>
